# =============================================================================
# Render Blueprint - MHA Bureau de Suivi (SG)
#
# Architecture single-service :
#   - 1 PostgreSQL (managed)
#   - 1 Web Service Node.js qui sert l'API Express + le build du frontend React
#   - 2 Cron Jobs (rapport hebdo + calcul alertes nocturnes)
#
# Usage : depuis le dashboard Render -> "New +" -> "Blueprint" -> pointer ce fichier.
# Documentation : https://render.com/docs/blueprint-spec
# =============================================================================

# NOTE : la base PostgreSQL "mha-bs-db" est creee hors du Blueprint
# (provisionee manuellement en plan basic-256mb, PostgreSQL 18, region frankfurt).
# On la reference simplement par son nom via fromDatabase dans les envVars
# ci-dessous. Aucun bloc "databases:" n'est necessaire ici.

services:
  # ---------------------------------------------------------------------------
  # App principale (Express + TypeScript) qui sert
  #   /api/*  -> backend
  #   /*      -> build Vite du frontend (SPA catch-all)
  # ---------------------------------------------------------------------------
  - type: web
    name: mha-sg-bs
    runtime: node
    plan: starter
    region: frankfurt
    branch: main
    # --include=dev pour avoir tsc, vite, etc. (Render met NODE_ENV=production par defaut)
    buildCommand: npm install --include=dev && npm run build:shared && npm run build:backend && npm run build:frontend
    startCommand: node backend/dist/server.js
    # Applique le schema PostgreSQL, cree l'admin, puis importe le seed Excel.
    # Les trois scripts sont idempotents (CREATE IF NOT EXISTS, skip si admin existe,
    # ne reinsere pas les lignes existantes dans la migration Excel).
    preDeployCommand: node backend/dist/scripts/applySchema.js && node backend/dist/scripts/bootstrapAdmin.js && node backend/dist/scripts/migrateExcelToDb.js
    healthCheckPath: /api/healthz
    disk:
      name: uploads
      mountPath: /opt/render/project/src/uploads
      sizeGB: 1
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: '10000'
      - key: DATABASE_URL
        fromDatabase:
          name: mha-bs-db
          property: connectionString
      - key: PUBLIC_URL
        value: https://mha-sg-bs.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://mha-sg-bs.onrender.com
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES
        value: 15m
      - key: JWT_REFRESH_EXPIRES
        value: 7d
      - key: EXTERNAL_API_ENABLED
        value: 'true'
      - key: BOOTSTRAP_ADMIN_USERNAME
        value: admin
      - key: BOOTSTRAP_ADMIN_EMAIL
        value: admin@mha.sn
      - key: BOOTSTRAP_ADMIN_PASSWORD
        sync: false # a renseigner manuellement dans le dashboard
      - key: BOOTSTRAP_ADMIN_FULLNAME
        value: Administrateur MHA
      - key: RESEND_API_KEY
        sync: false # a renseigner manuellement (optionnel)
      - key: MAIL_FROM
        value: Bureau de Suivi MHA <noreply@mha.sn>
      - key: UPLOADS_DIR
        value: /opt/render/project/src/uploads
      - key: UPLOADS_MAX_BYTES
        value: '20971520'
      - key: LOG_LEVEL
        value: info
      - key: PGSSLMODE
        value: require
      # En prod l'app et l'API sont sur la meme origine : VITE_API_BASE_URL relatif
      - key: VITE_API_BASE_URL
        value: /api

  # ---------------------------------------------------------------------------
  # Cron Job : envoi du rapport hebdomadaire chaque lundi 08:00 (UTC)
  # ---------------------------------------------------------------------------
  - type: cron
    name: mha-sg-bs-rapport-hebdo
    runtime: node
    plan: starter
    region: frankfurt
    schedule: '0 8 * * 1'
    buildCommand: npm install --include=dev && npm run build:shared && npm run build:backend
    startCommand: node backend/dist/scripts/sendWeeklyReport.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: mha-bs-db
          property: connectionString
      - key: RESEND_API_KEY
        sync: false
      - key: PGSSLMODE
        value: require

  # ---------------------------------------------------------------------------
  # Cron Job : calcul nocturne des alertes (echeances depassees, etc.)
  # ---------------------------------------------------------------------------
  - type: cron
    name: mha-sg-bs-alertes-nightly
    runtime: node
    plan: starter
    region: frankfurt
    schedule: '0 4 * * *'
    buildCommand: npm install --include=dev && npm run build:shared && npm run build:backend
    startCommand: node backend/dist/scripts/computeAlerts.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: mha-bs-db
          property: connectionString
      - key: PGSSLMODE
        value: require
