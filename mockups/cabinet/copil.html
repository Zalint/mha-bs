<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>COPIL projets · MHA Suivi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Sans:wght@300;400;500;600;700&family=Fira+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/styles.css">
  <style>
    .copil-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(380px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .copil-card { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-lg); overflow: hidden; transition: box-shadow .15s, border-color .15s; }
    .copil-card:hover { border-color: var(--color-primary); box-shadow: var(--shadow-lg); }
    .copil-head { padding: 18px 20px; border-bottom: 1px solid var(--color-border); display: flex; align-items: center; gap: 12px; }
    .copil-logo { width: 44px; height: 44px; border-radius: 10px; background: linear-gradient(135deg, var(--color-primary), var(--color-secondary)); color: #fff; font-weight: 700; font-size: 14px; display: flex; align-items: center; justify-content: center; font-family: var(--font-mono); }
    .copil-name { font-size: 16px; font-weight: 600; color: var(--color-fg); margin: 0; }
    .copil-sub { font-size: 12px; color: var(--color-fg-muted); margin: 2px 0 0; }
    .copil-body { padding: 16px 20px; }
    .copil-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 14px; }
    .copil-stat { text-align: center; padding: 8px; background: var(--color-muted); border-radius: 6px; }
    .copil-stat .v { font-family: var(--font-mono); font-size: 18px; font-weight: 600; color: var(--color-fg); }
    .copil-stat .k { font-size: 10.5px; color: var(--color-fg-muted); text-transform: uppercase; letter-spacing: .04em; margin-top: 2px; }
    .copil-stat.success .v { color: var(--color-success); }
    .copil-stat.warning .v { color: var(--color-warning); }
    .copil-stat.info .v { color: var(--color-primary); }
    .copil-progress-wrap { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
    .copil-progress-wrap .progress { flex: 1; height: 10px; }
    .copil-progress-wrap .pct { font-family: var(--font-mono); font-weight: 600; font-size: 14px; color: var(--color-fg); }
    .reco-preview { font-size: 12.5px; color: var(--color-fg-muted); line-height: 1.5; }
    .reco-preview .item { padding: 6px 0; border-bottom: 1px dashed var(--color-border); display: flex; gap: 8px; }
    .reco-preview .item:last-child { border-bottom: 0; }
    .reco-preview .num { color: var(--color-fg-muted); font-family: var(--font-mono); font-size: 11.5px; flex-shrink: 0; }
    .reco-preview .text { color: var(--color-fg-2); }
    .copil-foot { padding: 12px 20px; background: var(--color-surface-2); border-top: 1px solid var(--color-border); display: flex; justify-content: space-between; align-items: center; }
    .compare-bar { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-lg); padding: 16px 20px; margin-bottom: 20px; }
    .bar-chart { display: flex; flex-direction: column; gap: 10px; }
    .bar-row { display: grid; grid-template-columns: 130px 1fr 60px; gap: 12px; align-items: center; }
    .bar-row .lbl { font-size: 13px; font-weight: 500; }
    .bar-row .bar-track { background: var(--color-muted); height: 22px; border-radius: 4px; display: flex; overflow: hidden; }
    .bar-row .bar-track .seg { height: 100%; display: flex; align-items: center; justify-content: center; font-size: 11px; color: #fff; font-family: var(--font-mono); font-weight: 600; }
    .bar-row .bar-track .seg.realisee { background: var(--color-success); }
    .bar-row .bar-track .seg.encours { background: var(--color-warning); }
    .bar-row .bar-track .seg.attente { background: var(--color-primary); }
    .bar-row .tot { font-family: var(--font-mono); font-size: 13px; font-weight: 600; text-align: right; color: var(--color-fg); }
  </style>
</head>
<body data-page="copil" data-role="cabinet">
<div id="app-content">

  <div style="display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:8px">
    <div>
      <div style="display:inline-flex;align-items:center;gap:8px;padding:4px 10px;background:var(--color-primary-100);color:var(--color-primary-700);border-radius:6px;font-size:11.5px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px">
        <i data-lucide="clipboard-list" style="width:14px;height:14px"></i> Recommandations MHA
      </div>
      <h1 class="page-title">COPIL</h1>
      <p class="page-sub">Suivi des recommandations issues des 5 comités de pilotage du portefeuille MHA</p>
    </div>
    <div style="display:flex;gap:10px">
      <button class="btn btn-secondary" type="button"><i data-lucide="download" class="icon-sm"></i> Exporter</button>
      <button class="btn btn-secondary" type="button"><i data-lucide="filter" class="icon-sm"></i> Filtres</button>
    </div>
  </div>

  <!-- KPI strip -->
  <div class="kpi-grid" id="kpi-strip"></div>

  <!-- Comparative bar chart -->
  <div class="compare-bar">
    <div style="display:flex;align-items:center;margin-bottom:14px">
      <h2 style="margin:0;font-size:14.5px;font-weight:600">Comparatif d'avancement par COPIL</h2>
      <div style="margin-left:auto;display:flex;gap:14px;font-size:12px">
        <span style="display:inline-flex;align-items:center;gap:5px"><span class="legend-swatch" style="width:10px;height:10px;border-radius:2px;background:var(--color-success);display:inline-block"></span> Réalisé</span>
        <span style="display:inline-flex;align-items:center;gap:5px"><span class="legend-swatch" style="width:10px;height:10px;border-radius:2px;background:var(--color-warning);display:inline-block"></span> En cours</span>
        <span style="display:inline-flex;align-items:center;gap:5px"><span class="legend-swatch" style="width:10px;height:10px;border-radius:2px;background:var(--color-primary);display:inline-block"></span> En attente</span>
      </div>
    </div>
    <div class="bar-chart" id="bar-chart"></div>
  </div>

  <!-- Cards -->
  <div class="copil-grid" id="copil-grid"></div>

</div>

<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="../assets/data.js"></script>
<script src="../assets/shell.js"></script>
<script>
(function () {
  const COPILS = window.MHA_DATA.copils;

  // Demo seed: simulate some progress so the dashboard is meaningful for the mockup
  const seeded = {
    'PROGEP II':  { 'attente': 1, 'encours': 4, 'realisee': 2 },
    'PISEA':      { 'attente': 2, 'encours': 8, 'realisee': 2 },
    'PASEA-RD':   { 'attente': 3, 'encours': 7, 'realisee': 2 },
    'PDBH':       { 'attente': 1, 'encours': 2, 'realisee': 1 },
    'PROMOREN':   { 'attente': 1, 'encours': 3, 'realisee': 1 },
  };
  const meta = {
    'PROGEP II':  { sub: 'Projet de Gestion des Eaux Pluviales (Phase II)', short: 'PG2', ptf: 'Banque mondiale' },
    'PISEA':      { sub: 'Programme d\'Investissement Sectoriel Eau-Assainissement', short: 'PSE', ptf: 'Banque mondiale' },
    'PASEA-RD':   { sub: 'Programme d\'Appui au Secteur Eau-Assainissement (Régions Diourbel)', short: 'PRD', ptf: 'BAD' },
    'PDBH':       { sub: 'Programme Drainage Baie de Hann', short: 'PBH', ptf: 'Pays-Bas / INVEST INTL' },
    'PROMOREN':   { sub: 'Projet de Mobilisation des Ressources en Eau', short: 'PMR', ptf: 'Fonds propres / OLAC' },
  };

  // KPI strip
  const totalRecos = Object.values(COPILS).reduce((s, r) => s + r.length, 0);
  const totalRealised = Object.values(seeded).reduce((s, x) => s + x.realisee, 0);
  const totalEnCours = Object.values(seeded).reduce((s, x) => s + x.encours, 0);
  const totalAttente = Object.values(seeded).reduce((s, x) => s + x.attente, 0);
  const pct = Math.round(totalRealised / totalRecos * 1000) / 10;

  document.getElementById('kpi-strip').innerHTML = `
    <div class="kpi"><div class="kpi-label">COPIL suivis</div><div class="kpi-value">5</div><div class="kpi-delta">Portefeuille MHA</div><div class="kpi-icon"><i data-lucide="folder-kanban"></i></div></div>
    <div class="kpi"><div class="kpi-label">Recommandations</div><div class="kpi-value">${totalRecos}</div><div class="kpi-delta">tous COPIL confondus</div><div class="kpi-icon"><i data-lucide="list-checks"></i></div></div>
    <div class="kpi success"><div class="kpi-label">Réalisées</div><div class="kpi-value">${totalRealised}</div><div class="kpi-delta">${pct} %</div><div class="kpi-icon"><i data-lucide="check-circle-2"></i></div></div>
    <div class="kpi warning"><div class="kpi-label">En cours</div><div class="kpi-value">${totalEnCours}</div><div class="kpi-delta">${totalAttente} en attente</div><div class="kpi-icon"><i data-lucide="loader-2"></i></div></div>
  `;

  // Bar chart
  document.getElementById('bar-chart').innerHTML = Object.entries(seeded).map(([name, s]) => {
    const tot = s.realisee + s.encours + s.attente;
    const w = v => (v / tot * 100);
    return `<div class="bar-row">
      <div class="lbl">${name}</div>
      <div class="bar-track">
        ${s.realisee>0 ? `<div class="seg realisee" style="width:${w(s.realisee)}%" title="Réalisées: ${s.realisee}">${s.realisee}</div>`:''}
        ${s.encours>0  ? `<div class="seg encours"  style="width:${w(s.encours)}%"  title="En cours: ${s.encours}">${s.encours}</div>`:''}
        ${s.attente>0  ? `<div class="seg attente"  style="width:${w(s.attente)}%"  title="En attente: ${s.attente}">${s.attente}</div>`:''}
      </div>
      <div class="tot">${tot}</div>
    </div>`;
  }).join('');

  // Cards
  document.getElementById('copil-grid').innerHTML = Object.entries(COPILS).map(([name, recos]) => {
    const s = seeded[name];
    const tot = recos.length;
    const realised = s.realisee;
    const pct = Math.round(realised / tot * 1000) / 10;
    const m = meta[name];
    const preview = recos.slice(0, 3).map(r => `<div class="item"><span class="num">${r.NUM}</span><span class="text">${esc(r.TEXTE).slice(0, 110)}${r.TEXTE.length > 110 ? '…' : ''}</span></div>`).join('');
    return `<div class="copil-card">
      <div class="copil-head">
        <div class="copil-logo">${m.short}</div>
        <div style="flex:1">
          <h3 class="copil-name">${name}</h3>
          <p class="copil-sub">${m.sub}</p>
        </div>
        <span class="badge neutral"><i data-lucide="banknote" class="icon-sm"></i> ${m.ptf}</span>
      </div>
      <div class="copil-body">
        <div class="copil-progress-wrap">
          <div class="progress success"><span style="width:${pct}%"></span></div>
          <span class="pct">${pct} %</span>
        </div>
        <div class="copil-stats">
          <div class="copil-stat success"><div class="v">${s.realisee}</div><div class="k">Réalisées</div></div>
          <div class="copil-stat warning"><div class="v">${s.encours}</div><div class="k">En cours</div></div>
          <div class="copil-stat info"><div class="v">${s.attente}</div><div class="k">Attente</div></div>
          <div class="copil-stat"><div class="v">${tot}</div><div class="k">Total</div></div>
        </div>
        <div class="reco-preview">${preview}</div>
      </div>
      <div class="copil-foot">
        <span style="font-size:12px;color:var(--color-fg-muted)">Dernier comité : <b style="color:var(--color-fg-2);font-family:var(--font-mono)">05-03-2026</b></span>
        <a class="btn btn-ghost btn-sm" href="#">Détails <i data-lucide="arrow-right" class="icon-sm"></i></a>
      </div>
    </div>`;
  }).join('');

  if (window.lucide) lucide.createIcons();
  function esc(s) { return String(s||'').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'})[c]); }
})();
</script>
</body>
</html>
